name: .NET Core Build Check

on:
 pull_request:
    branches:
      - main
      - 'v*/release'
      
permissions:
  contents: read
  pull-requests: read
  
jobs:
  build:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x' # Match TargetFramework net10.0 in uTPro.Project.Web.csproj

    - name: Restore dependencies
      run: dotnet restore ./uTPro/Project/uTPro.Project.Web/uTPro.Project.Web.csproj

    - name: Build
      run: dotnet build ./uTPro/Project/uTPro.Project.Web/uTPro.Project.Web.csproj --no-restore

    #- name: Run tests (Optional)
      #run: dotnet test --no-build # Optional, but recommended for CI
